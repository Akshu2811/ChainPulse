# Copy this file to application.yml and fill in your own values
spring:
  application:
    name: chainpulse

  datasource:
    url: jdbc:postgresql://localhost:5432/chainpulse
    username: YOUR_DB_USERNAME
    password: YOUR_DB_PASSWORD

  kafka:
    bootstrap-servers: localhost:9092

  data:
    redis:
      host: localhost
      port: 6379