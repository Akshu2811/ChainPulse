<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChainPulse — Supply Chain Disruption Alert Engine</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sockjs-client/1.6.1/sockjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>

    <style>
        :root {
            --bg-primary:    #0f1117;
            --bg-secondary:  #1a1f2e;
            --bg-tertiary:   #252b3b;
            --border:        rgba(255,255,255,0.07);
            --text-primary:  #e2e8f0;
            --text-secondary:#94a3b8;
            --text-muted:    #64748b;
            --teal:          #1D9E75;
            --teal-light:    rgba(29,158,117,0.12);
            --amber:         #EF9F27;
            --amber-light:   rgba(239,159,39,0.12);
            --red:           #E24B4A;
            --red-light:     rgba(226,75,74,0.12);
            --blue:          #378ADD;
            --blue-light:    rgba(55,138,221,0.12);
            --purple:        #7F77DD;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            font-size: 14px;
        }

        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 24px;
            background: var(--bg-secondary);
            border-bottom: 0.5px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo { font-size: 16px; font-weight: 600; color: var(--text-primary); letter-spacing: -0.3px; }
        .logo span { color: var(--teal); }

        .nav-right { display: flex; align-items: center; gap: 16px; }

        .ws-status {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 11px;
            color: var(--text-muted);
            background: var(--bg-tertiary);
            padding: 4px 10px;
            border-radius: 20px;
            border: 0.5px solid var(--border);
        }

        .ws-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--text-muted); transition: background 0.3s; }
        .ws-dot.connected { background: var(--teal); }
        .ws-dot.disconnected { background: var(--red); }

        .last-updated { font-size: 11px; color: var(--text-muted); }

        .main { padding: 20px 24px; max-width: 1400px; margin: 0 auto; }

        .metrics { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 16px; }

        .metric-card {
            background: var(--bg-secondary);
            border: 0.5px solid var(--border);
            border-radius: 10px;
            padding: 16px 18px;
            transition: border-color 0.2s;
        }
        .metric-card:hover { border-color: rgba(255,255,255,0.15); }
        .metric-label { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 8px; font-weight: 500; }
        .metric-value { font-size: 28px; font-weight: 600; line-height: 1; margin-bottom: 4px; }
        .metric-sub { font-size: 11px; color: var(--text-muted); }
        .metric-card.teal .metric-value { color: var(--teal); }
        .metric-card.amber .metric-value { color: var(--amber); }
        .metric-card.red   .metric-value { color: var(--red); }
        .metric-card.blue  .metric-value { color: var(--blue); }

        .grid { display: grid; grid-template-columns: 1fr 340px; gap: 12px; }
        .left-col { display: flex; flex-direction: column; gap: 12px; }

        .panel {
            background: var(--bg-secondary);
            border: 0.5px solid var(--border);
            border-radius: 10px;
            padding: 16px;
        }

        .panel-title { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; font-weight: 500; margin-bottom: 14px; }

        .supplier-row { display: flex; align-items: center; gap: 12px; padding: 10px 0; border-bottom: 0.5px solid var(--border); }
        .supplier-row:last-child { border-bottom: none; }
        .supplier-info { flex: 1; min-width: 0; }
        .supplier-name { font-size: 13px; font-weight: 500; color: var(--text-primary); margin-bottom: 2px; }
        .supplier-meta { font-size: 11px; color: var(--text-muted); }

        .sla-bar-wrap { flex: 1; height: 4px; background: rgba(255,255,255,0.06); border-radius: 2px; overflow: hidden; }
        .sla-bar { height: 100%; border-radius: 2px; transition: width 0.5s ease; }
        .sla-bar.healthy  { background: var(--teal); }
        .sla-bar.at-risk  { background: var(--amber); }
        .sla-bar.critical { background: var(--red); }

        .badge { font-size: 10px; padding: 3px 9px; border-radius: 20px; font-weight: 500; white-space: nowrap; }
        .badge.healthy  { background: var(--teal-light);  color: var(--teal);  border: 0.5px solid rgba(29,158,117,0.25); }
        .badge.at-risk  { background: var(--amber-light); color: var(--amber); border: 0.5px solid rgba(239,159,39,0.25); }
        .badge.critical { background: var(--red-light);   color: var(--red);   border: 0.5px solid rgba(226,75,74,0.25); }

        /* ── Alert Feed ─────────────────────────────────────────────── */
        .alert-feed {
            max-height: 580px;
            overflow-y: auto;
            scrollbar-width: thin;
            scrollbar-color: var(--bg-tertiary) transparent;
        }

        .alert-item {
            padding: 10px 12px;
            border-radius: 8px;
            margin-bottom: 6px;
            border-left: 2px solid transparent;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(-8px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .alert-item.CRITICAL { background: var(--red-light);   border-color: var(--red); }
        .alert-item.WARNING  { background: var(--amber-light); border-color: var(--amber); }
        .alert-item.INFO     { background: var(--teal-light);  border-color: var(--teal); }

        .alert-title { font-size: 12px; font-weight: 500; color: var(--text-primary); margin-bottom: 3px; }
        .alert-meta  { font-size: 11px; color: var(--text-muted); }

        /* ── AI Analysis Panel ──────────────────────────────────────── */
        .ai-analysis {
            margin-top: 8px;
            padding: 8px 10px;
            background: rgba(29,158,117,0.06);
            border-left: 2px solid var(--teal);
            border-radius: 4px;
            font-size: 11px;
            color: var(--text-secondary);
            line-height: 1.6;
            animation: fadeIn 0.4s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(4px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .ai-header {
            display: flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 5px;
        }

        .ai-label {
            font-size: 10px;
            font-weight: 600;
            color: var(--teal);
            letter-spacing: 0.04em;
            text-transform: uppercase;
        }

        .ai-thinking {
            margin-top: 8px;
            padding: 6px 10px;
            background: rgba(29,158,117,0.04);
            border-left: 2px solid rgba(29,158,117,0.3);
            border-radius: 4px;
            font-size: 10px;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            gap: 6px;
            animation: fadeIn 0.3s ease;
        }

        .ai-spinner {
            width: 8px;
            height: 8px;
            border: 1.5px solid rgba(29,158,117,0.3);
            border-top-color: var(--teal);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            flex-shrink: 0;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .ai-text { white-space: pre-line; }

        .ai-show-more {
            color: var(--teal);
            cursor: pointer;
            font-size: 10px;
            margin-top: 4px;
            display: inline-block;
        }
        .ai-show-more:hover { text-decoration: underline; }

        /* ── Chart ─────────────────────────────────────────────────── */
        .chart-wrap { height: 180px; position: relative; }

        .skeleton {
            background: linear-gradient(90deg, var(--bg-tertiary) 25%, var(--bg-secondary) 50%, var(--bg-tertiary) 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
            border-radius: 6px;
            height: 20px;
        }

        @keyframes shimmer {
            0%   { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        .empty-state { text-align: center; padding: 40px 20px; color: var(--text-muted); font-size: 13px; }

        @media (max-width: 900px) {
            .grid    { grid-template-columns: 1fr; }
            .metrics { grid-template-columns: repeat(2, 1fr); }
        }

        /* ── Toast ──────────────────────────────────────────────────── */
        .toast-container {
            position: fixed;
            bottom: 24px;
            right: 24px;
            display: flex;
            flex-direction: column-reverse;
            gap: 8px;
            z-index: 9999;
        }

        .toast {
            background: var(--bg-secondary);
            border: 0.5px solid var(--border);
            border-radius: 10px;
            padding: 12px 16px;
            min-width: 280px;
            max-width: 360px;
            display: flex;
            align-items: flex-start;
            gap: 10px;
            animation: toastIn 0.3s ease;
            box-shadow: 0 4px 24px rgba(0,0,0,0.4);
        }

        .toast.CRITICAL { border-left: 3px solid var(--red); }
        .toast.WARNING  { border-left: 3px solid var(--amber); }

        @keyframes toastIn  { from { opacity:0; transform:translateX(40px); } to { opacity:1; transform:translateX(0); } }
        @keyframes toastOut { from { opacity:1; transform:translateX(0); } to { opacity:0; transform:translateX(40px); } }

        .toast-icon  { font-size: 16px; flex-shrink: 0; margin-top: 1px; }
        .toast-body  { flex: 1; min-width: 0; }
        .toast-title { font-size: 12px; font-weight: 500; color: var(--text-primary); margin-bottom: 2px; }
        .toast-msg   { font-size: 11px; color: var(--text-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .toast-ai    { font-size: 10px; color: var(--teal); margin-top: 3px; }
        .toast-close { font-size: 14px; color: var(--text-muted); cursor: pointer; flex-shrink: 0; line-height: 1; }
        .toast-close:hover { color: var(--text-primary); }
    </style>
</head>
<body>

<nav class="navbar">
    <div class="logo">Chain<span>Pulse</span></div>
    <div class="nav-right">
        <div class="ws-status">
            <div class="ws-dot" id="wsDot"></div>
            <span id="wsStatusText">Connecting...</span>
        </div>
        <div class="last-updated" id="lastUpdated">—</div>
    </div>
</nav>

<div class="main">

    <div class="metrics">
        <div class="metric-card teal">
            <div class="metric-label">Total Suppliers</div>
            <div class="metric-value" id="totalSuppliers">—</div>
            <div class="metric-sub">Monitored logistics partners</div>
        </div>
        <div class="metric-card amber" onclick="window.location.href='/alerts.html'" style="cursor:pointer">
            <div class="metric-label">Active Alerts</div>
            <div class="metric-value" id="activeAlerts">—</div>
            <div class="metric-sub" id="alertSub">Loading...</div>
        </div>
        <div class="metric-card red">
            <div class="metric-label">Critical Alerts</div>
            <div class="metric-value" id="criticalAlerts">—</div>
            <div class="metric-sub">Immediate action required</div>
        </div>
        <div class="metric-card blue">
            <div class="metric-label">Resolved Alerts</div>
            <div class="metric-value" id="resolvedAlerts">—</div>
            <div class="metric-sub">Fixed and closed</div>
        </div>
    </div>

    <div class="grid">

        <div class="left-col">
            <div class="panel">
                <div class="panel-title">Supplier health</div>
                <div id="supplierList">
                    <div class="skeleton" style="margin-bottom:10px"></div>
                    <div class="skeleton" style="margin-bottom:10px"></div>
                    <div class="skeleton"></div>
                </div>
            </div>

            <div class="panel">
                <div class="panel-title">Disruption trend — last 7 days</div>
                <div class="chart-wrap">
                    <canvas id="trendChart"></canvas>
                </div>
            </div>
        </div>

        <!-- Right Column — Live Alert Feed -->
        <div class="panel">
            <div class="panel-title">
                Live alert feed
                <span id="alertCount" style="float:right;color:var(--red);font-size:11px"></span>
            </div>
            <div class="alert-feed" id="alertFeed">
                <div class="empty-state">⏳ Waiting for alerts...</div>
            </div>
        </div>

    </div>
</div>

<div class="toast-container" id="toastContainer"></div>

<script>
    let stompClient = null;
    let alertCount  = 0;
    let trendChart  = null;

    function timeAgo(dateStr) {
        const diff = Math.floor((Date.now() - new Date(dateStr)) / 1000);
        if (diff < 60)   return `${diff}s ago`;
        if (diff < 3600) return `${Math.floor(diff/60)}m ago`;
        return `${Math.floor(diff/3600)}h ago`;
    }

    function setWsStatus(connected) {
        const dot  = document.getElementById('wsDot');
        const text = document.getElementById('wsStatusText');
        if (connected) {
            dot.className    = 'ws-dot connected';
            text.textContent = 'Live — WebSocket connected';
            text.style.color = 'var(--teal)';
        } else {
            dot.className    = 'ws-dot disconnected';
            text.textContent = 'Disconnected — reconnecting...';
            text.style.color = 'var(--red)';
        }
    }

    function updateStats(stats) {
        document.getElementById('totalSuppliers').textContent = stats.totalSuppliers  ?? '—';
        document.getElementById('activeAlerts').textContent   = stats.activeAlerts    ?? '—';
        document.getElementById('criticalAlerts').textContent = stats.criticalAlerts  ?? '—';
        document.getElementById('resolvedAlerts').textContent = stats.resolvedAlerts  ?? '—';
        document.getElementById('alertSub').textContent =
            `${stats.warningAlerts ?? 0} warning · ${stats.criticalAlerts ?? 0} critical`;
        document.getElementById('lastUpdated').textContent =
            'Updated ' + new Date().toLocaleTimeString('en-IN');
    }

    function renderSuppliers(suppliers) {
        const list = document.getElementById('supplierList');
        if (!suppliers || suppliers.length === 0) {
            list.innerHTML = '<div class="empty-state">No suppliers found</div>';
            return;
        }
        list.innerHTML = suppliers.map(s => {
            const statusMap   = { 'HEALTHY': 'healthy', 'AT_RISK': 'at-risk', 'CRITICAL': 'critical' };
            const statusClass = statusMap[s.status] || 'healthy';
            const statusLabel = s.status?.replace('_', ' ') || 'Healthy';
            const barWidth    = statusClass === 'healthy' ? 88 : statusClass === 'at-risk' ? 55 : 25;
            return `
            <div class="supplier-row">
                <div class="supplier-info">
                    <div class="supplier-name">${s.name}</div>
                    <div class="supplier-meta">${s.location} · SLA: ${s.slaThresholdHours}h · ${s.activeAlerts ?? 0} active alerts</div>
                </div>
                <div class="sla-bar-wrap">
                    <div class="sla-bar ${statusClass}" style="width:${barWidth}%"></div>
                </div>
                <span class="badge ${statusClass}">${statusLabel}</span>
            </div>`;
        }).join('');
    }

    // ── Add alert card to feed ────────────────────────────────────────────────
    function addAlertToFeed(alert) {
        const feed  = document.getElementById('alertFeed');
        const empty = feed.querySelector('.empty-state');
        if (empty) empty.remove();

        const div = document.createElement('div');
        div.className = `alert-item ${alert.severity || 'INFO'}`;
        div.id = `alert-${alert.id}`;
        div.innerHTML = `
        <div style="display:flex;justify-content:space-between;align-items:flex-start">
            <div class="alert-title">${alert.ruleType?.replace(/_/g,' ')} — ${alert.supplierName || alert.supplier?.name || 'Unknown'}</div>
            <button onclick="resolveAlert(${alert.id})" style="
                background:rgba(255,255,255,0.08);
                border:0.5px solid rgba(255,255,255,0.15);
                color:var(--text-muted);
                font-size:10px;
                padding:2px 8px;
                border-radius:20px;
                cursor:pointer;
                white-space:nowrap;
                margin-left:8px;
                flex-shrink:0;
            ">✓ Resolve</button>
        </div>
        <div class="alert-meta">${alert.message?.substring(0, 80)}...</div>
        <div class="alert-meta" style="margin-top:3px;opacity:0.6">
            ${alert.createdAt ? new Date(alert.createdAt).toLocaleTimeString('en-IN') : 'Just now'} · ${alert.severity}
        </div>
        ${alert.severity === 'CRITICAL' ? `
        <div class="ai-thinking" id="ai-thinking-${alert.id}">
            <div class="ai-spinner"></div>
            <span>🤖 Gemini analyzing root cause...</span>
        </div>` : ''}`;

        feed.insertBefore(div, feed.firstChild);

        const items = feed.querySelectorAll('.alert-item');
        if (items.length > 50) items[items.length - 1].remove();

        alertCount++;
        document.getElementById('alertCount').textContent = `${alertCount} new`;
    }

    // ── Show AI analysis on alert card ───────────────────────────────────────
    function showAiAnalysis(alertId, analysis) {
        const alertEl = document.getElementById(`alert-${alertId}`);
        if (!alertEl) return;

        // Remove the thinking spinner
        const thinking = document.getElementById(`ai-thinking-${alertId}`);
        if (thinking) thinking.remove();

        // Don't duplicate
        if (alertEl.querySelector('.ai-analysis')) return;

        // Truncate to first 220 chars for compact view
        const shortLen = 220;
        const isLong   = analysis.length > shortLen;
        const shortText = isLong ? analysis.substring(0, shortLen) + '...' : analysis;

        const aiDiv = document.createElement('div');
        aiDiv.className = 'ai-analysis';
        aiDiv.innerHTML = `
        <div class="ai-header">
            <span>🤖</span>
            <span class="ai-label">Gemini Root Cause</span>
        </div>
        <div class="ai-text" id="ai-text-${alertId}">${escapeHtml(shortText)}</div>
        ${isLong ? `<span class="ai-show-more" onclick="expandAi(${alertId}, \`${escapeForAttr(analysis)}\`)">Show full analysis ↓</span>` : ''}`;

        alertEl.appendChild(aiDiv);
    }

    function expandAi(alertId, fullText) {
        const textEl = document.getElementById(`ai-text-${alertId}`);
        if (textEl) textEl.textContent = fullText;
        // Remove show more button
        const btn = textEl?.nextElementSibling;
        if (btn && btn.classList.contains('ai-show-more')) btn.remove();
    }

    function escapeHtml(str) {
        return str
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;');
    }

    function escapeForAttr(str) {
        return str.replace(/\\/g, '\\\\').replace(/`/g, '\\`').replace(/\$/g, '\\$');
    }

    async function loadTrendChart() {
        try {
            const res  = await fetch('/api/alerts/stats/trend?days=7');
            const data = await res.json();
            const countPerDay = data.countPerDay || {};
            const labels = Object.keys(countPerDay);
            const values = Object.values(countPerDay);

            const ctx = document.getElementById('trendChart').getContext('2d');
            if (trendChart) trendChart.destroy();

            trendChart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels,
                    datasets: [{
                        label: 'Alerts',
                        data: values,
                        backgroundColor: 'rgba(226,75,74,0.6)',
                        borderColor: '#E24B4A',
                        borderWidth: 1,
                        borderRadius: 4,
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        x: { ticks: { color: '#64748b', font: { size: 10 } }, grid: { color: 'rgba(255,255,255,0.04)' } },
                        y: { ticks: { color: '#64748b', font: { size: 10 } }, grid: { color: 'rgba(255,255,255,0.04)' }, beginAtZero: true }
                    }
                }
            });
        } catch(e) { console.error('Chart load failed:', e); }
    }

    async function loadInitialData() {
        try {
            const statsRes = await fetch('/api/stats');
            updateStats(await statsRes.json());

            const suppRes   = await fetch('/api/suppliers');
            const suppliers = await suppRes.json();
            const healthData = await Promise.all(
                suppliers.map(s => fetch(`/api/suppliers/${s.id}/health`).then(r => r.json()))
            );
            const suppliersWithHealth = suppliers.map((s, i) => ({
                ...s, status: healthData[i].status, activeAlerts: healthData[i].activeAlerts
            }));
            suppliersWithHealth.sort((a, b) => {
                const order = { 'CRITICAL': 0, 'AT_RISK': 1, 'HEALTHY': 2 };
                return (order[a.status] ?? 2) - (order[b.status] ?? 2);
            });
            renderSuppliers(suppliersWithHealth);

            const alertRes = await fetch('/api/alerts/active');
            const alerts   = await alertRes.json();
            alerts.slice(-10).reverse().forEach(a => addAlertToFeed({ ...a, supplierName: a.supplier?.name }));

            loadTrendChart();
        } catch(e) { console.error('Initial data load failed:', e); }
    }

    async function resolveAlert(alertId) {
        try {
            const res = await fetch(`/api/alerts/${alertId}/resolve`, { method: 'PUT' });
            if (res.ok) {
                const alertEl = document.getElementById(`alert-${alertId}`);
                if (alertEl) {
                    alertEl.style.transition = 'opacity 0.3s, transform 0.3s';
                    alertEl.style.opacity    = '0';
                    alertEl.style.transform  = 'translateX(20px)';
                    setTimeout(() => alertEl.remove(), 300);
                }
            }
        } catch(e) { console.error('Failed to resolve alert:', e); }
    }

    function showToast(alert) {
        if (alert.severity === 'INFO') return;
        const container = document.getElementById('toastContainer');
        const icon      = alert.severity === 'CRITICAL' ? '🚨' : '⚠️';

        const toast = document.createElement('div');
        toast.className = `toast ${alert.severity}`;
        toast.innerHTML = `
        <div class="toast-icon">${icon}</div>
        <div class="toast-body">
            <div class="toast-title">${alert.severity} — ${alert.supplierName || 'Unknown'}</div>
            <div class="toast-msg">${alert.ruleType?.replace(/_/g,' ')} · ${alert.message?.substring(0, 50)}...</div>
            ${alert.severity === 'CRITICAL' ? '<div class="toast-ai">🤖 Gemini analyzing root cause...</div>' : ''}
        </div>
        <div class="toast-close" onclick="this.parentElement.remove()">✕</div>`;

        container.appendChild(toast);

        setTimeout(() => {
            if (toast.parentElement) {
                toast.style.animation = 'toastOut 0.3s ease forwards';
                setTimeout(() => toast.remove(), 300);
            }
        }, 6000);

        const toasts = container.querySelectorAll('.toast');
        if (toasts.length > 5) toasts[0].remove();
    }

    // ── WebSocket Connection ──────────────────────────────────────────────────
    function connectWebSocket() {
        const socket = new SockJS('/ws');
        stompClient  = Stomp.over(socket);
        stompClient.debug = null;

        stompClient.connect({}, function(frame) {
            setWsStatus(true);
            console.log('✅ ChainPulse WebSocket connected');

            // Live alerts
            stompClient.subscribe('/topic/alerts', function(message) {
                const alert = JSON.parse(message.body);
                addAlertToFeed(alert);
                showToast(alert);
            });

            // Live stats
            stompClient.subscribe('/topic/stats', function(message) {
                updateStats(JSON.parse(message.body));
            });

            // ── AI Root Cause Analysis ────────────────────────────────────
            stompClient.subscribe('/topic/ai-analysis', function(message) {
                const data = JSON.parse(message.body);
                showAiAnalysis(data.alertId, data.analysis);
            });

        }, function(error) {
            setWsStatus(false);
            setTimeout(connectWebSocket, 5000);
        });
    }

    loadInitialData();
    connectWebSocket();

    setInterval(loadTrendChart, 60000);
    setInterval(async () => {
        try {
            const suppRes    = await fetch('/api/suppliers');
            const suppliers  = await suppRes.json();
            const healthData = await Promise.all(
                suppliers.map(s => fetch(`/api/suppliers/${s.id}/health`).then(r => r.json()))
            );
            const suppliersWithHealth = suppliers.map((s, i) => ({
                ...s, status: healthData[i].status, activeAlerts: healthData[i].activeAlerts
            }));
            suppliersWithHealth.sort((a, b) => {
                const order = { 'CRITICAL': 0, 'AT_RISK': 1, 'HEALTHY': 2 };
                return (order[a.status] ?? 2) - (order[b.status] ?? 2);
            });
            renderSuppliers(suppliersWithHealth);
        } catch(e) { console.error('Supplier refresh failed:', e); }
    }, 30000);
</script>
</body>
</html>
